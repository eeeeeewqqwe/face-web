<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>人脸识别</title>
  <script src="lib/face-api.min.js"></script>
  <script type="text/javascript" src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff; height: 100vh; overflow: hidden;
    }
    .container { display: flex; flex-direction: column; height: 100vh; }
    .header {
      padding: 16px 20px; font-size: 17px; font-weight: 600;
      text-align: center; border-bottom: 1px solid #f0f0f0;
    }
    .status-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; padding: 12px 20px; font-size: 14px; color: #999;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-red { background: #f56c6c; }
    .dot-green { background: #67c23a; }
    .dot-yellow { background: #e6a23c; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .video-area {
      position: relative; flex: 1; display: flex;
      align-items: center; justify-content: center;
      background: #000; overflow: hidden;
    }
    video, canvas {
      position: absolute; width: 100%; height: 100%; object-fit: cover;
    }
    video { transform: scaleX(-1); }
    canvas { display: none; transform: scaleX(-1); }
    .overlay {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 240px; height: 240px;
      border: 2px dashed rgba(255,255,255,0.6);
      border-radius: 16px; pointer-events: none;
    }
    .overlay.success { border-color: #67c23a; border-style: solid; }
    .overlay.fail { border-color: #f56c6c; border-style: solid; }
    .controls {
      padding: 20px; display: flex; flex-direction: column; gap: 12px;
    }
    .btn {
      width: 100%; padding: 14px; border: none;
      border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
    }
    .btn-primary { background: #3388FF; color: #fff; }
    .btn-primary:disabled { background: #a0c4ff; }
    .btn-success { background: #67c23a; color: #fff; }
    .btn-outline { background: #fff; color: #3388FF; border: 1px solid #3388FF; }
    .btn-danger { background: #fff; color: #f56c6c; border: 1px solid #f56c6c; }
    .hint { text-align: center; font-size: 12px; color: #ccc; }
    .error-toast {
      padding: 12px 20px; background: #fef0f0; color: #f56c6c;
      font-size: 13px; text-align: center; display: none;
    }
    .result-banner {
      padding: 16px 20px; text-align: center; font-size: 15px; font-weight: 600;
      display: none;
    }
    .result-banner.match { background: #f0f9eb; color: #67c23a; display: block; }
    .result-banner.mismatch { background: #fef0f0; color: #f56c6c; display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header" id="headerTitle">人脸识别</div>

    <div class="status-bar" id="statusBar">
      <span class="dot dot-yellow" id="statusDot"></span>
      <span id="statusText">正在加载模型…</span>
    </div>

    <div class="result-banner" id="resultBanner"></div>

    <div class="video-area">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="overlay" id="overlay"></div>
    </div>

    <div class="error-toast" id="errorToast"></div>

    <div class="controls">
      <button class="btn btn-primary" id="captureBtn" disabled>拍照</button>
      <button class="btn btn-success" id="doneBtn" style="display:none;">完成</button>
      <button class="btn btn-outline" id="retryBtn" style="display:none;">重新采集</button>
      <p class="hint" id="hintText">请将人脸对准框内</p>
    </div>
  </div>

  <script>
    (function() {
      var MODELS_URL = 'models/';
      var THRESHOLD = 0.45;
      var HIGH_CONFIDENCE = 0.4;

      // ===== 解析 URL 参数 =====
      var params = new URLSearchParams(location.search);
      var UID = params.get('uid') || 'default';
      var STORAGE_KEY = 'faceDescriptor_' + UID;

      // ===== DOM 引用 =====
      var $ = function(id) { return document.getElementById(id); };
      var video = $('video');
      var canvas = $('canvas');
      var ctx = canvas.getContext('2d');
      var overlay = $('overlay');
      var headerTitle = $('headerTitle');
      var statusDot = $('statusDot');
      var statusText = $('statusText');
      var captureBtn = $('captureBtn');
      var doneBtn = $('doneBtn');
      var retryBtn = $('retryBtn');
      var hintText = $('hintText');
      var errorToast = $('errorToast');
      var resultBanner = $('resultBanner');

      // ===== 状态 =====
      var mode = 'enroll';         // enroll | verify
      var storedDescriptor = null; // 已存储的描述子（验证模式用）
      var currentDescriptor = null;
      var resultData = null;       // 最终回传给小程序的数据
      var stream = null;
      var detectionTimer = null;       // setInterval handle
      var stabilityCount = 0;          // consecutive face-in-box count
      var STABILITY_NEEDED = 1;        // need 1 stable detection
      var DETECTION_INTERVAL = 300;    // detect every 300ms

      // ===== 初始化：从 localStorage 判断模式 =====
      function initMode() {
        if (!params.get('uid') || params.get('uid').trim() === '') {
          showError('缺少用户标识 (uid)');
          setStatus('error', '缺少用户标识');
          return false;
        }
        var raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          try {
            storedDescriptor = JSON.parse(raw);
            mode = 'verify';
            headerTitle.textContent = '第二步：人脸识别验证';
            hintText.textContent = '请将人脸对准框内，保持不动即可自动验证';
          } catch (e) {
            storedDescriptor = null;
          }
        }
        if (!storedDescriptor) {
          mode = 'enroll';
          headerTitle.textContent = '第一步：人脸采集录入';
          hintText.textContent = '请将人脸对准框内，保持不动即可自动采集';
        }
      }

      function showError(msg) {
        errorToast.textContent = msg;
        errorToast.style.display = 'block';
        setTimeout(function() { errorToast.style.display = 'none'; }, 3000);
      }

      function setStatus(state, text) {
        statusDot.className = 'dot';
        statusText.textContent = text || '';
        switch (state) {
          case 'loading':
            statusDot.classList.add('dot-yellow'); break;
          case 'ready':
            statusDot.classList.add('dot-green'); break;
          case 'capturing':
            statusDot.classList.add('dot-yellow'); break;
          case 'success':
            statusDot.classList.add('dot-green');
            overlay.classList.add('success'); break;
          case 'match':
            statusDot.classList.add('dot-green');
            overlay.classList.add('success'); break;
          case 'mismatch':
            statusDot.classList.add('dot-red');
            overlay.classList.add('fail'); break;
          case 'error':
            statusDot.classList.add('dot-red'); break;
        }
      }

      // ===== 加载模型 =====
      async function loadModels() {
        setStatus('loading', '加载模型中…');
        try {
          await faceapi.nets.tinyFaceDetector.loadFromUri(MODELS_URL);
          await faceapi.nets.faceLandmark68Net.loadFromUri(MODELS_URL);
          await faceapi.nets.faceRecognitionNet.loadFromUri(MODELS_URL);
        } catch (e) {
          showError('模型加载失败: ' + e.message);
          return;
        }
        await startCamera();
      }

      async function startCamera() {
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: 640, height: 480 }
          });
          video.srcObject = stream;
          video.onloadedmetadata = function() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            setStatus('ready', '请将人脸对准框内');
            startDetectionLoop();
          };
        } catch (e) {
          showError('无法访问摄像头: ' + e.message);
        }
      }

      // ===== 自动检测循环 =====
      function startDetectionLoop() {
        if (detectionTimer) return;
        setStatus('ready', '请将人脸对准框内');
        hintText.textContent = mode === 'verify'
          ? '请将人脸移至取景框内，保持不动即可自动验证'
          : '请将人脸移至取景框内，保持不动即可自动采集';
        stabilityCount = 0;
        detectionTimer = setInterval(autoDetect, DETECTION_INTERVAL);
      }

      function stopDetectionLoop() {
        if (detectionTimer) {
          clearInterval(detectionTimer);
          detectionTimer = null;
        }
      }

      async function autoDetect() {
        if (currentDescriptor) {
          stopDetectionLoop();
          return;
        }

        try {
          // Phase 1: 快速裸检测 — 宽容、快速
          var detection = await faceapi.detectSingleFace(
            video,
            new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 })
          );

          if (!detection) {
            if (stabilityCount > 0) stabilityCount = 0;
            hintText.textContent = mode === 'verify'
              ? '请将人脸移至取景框内，保持不动即可自动验证'
              : '请将人脸移至取景框内，保持不动即可自动采集';
            return;
          }

          if (!isFaceInOverlay(detection)) {
            if (stabilityCount > 0) stabilityCount = 0;
            hintText.textContent = getPositionHint(detection);
            return;
          }

          stabilityCount++;
          hintText.textContent = '请保持不动...';

          if (stabilityCount >= STABILITY_NEEDED) {
            stopDetectionLoop();
            setStatus('capturing', '采集中…');

            // Phase 2: 完整检测提取描述子
            var fullDetection = await faceapi
              .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 }))
              .withFaceLandmarks()
              .withFaceDescriptor();

            if (!fullDetection) {
              showError('采集失败，请重新对准');
              setStatus('ready', '请将人脸对准框内');
              startDetectionLoop();
              return;
            }

            currentDescriptor = Array.from(fullDetection.descriptor);
            ctx.drawImage(video, 0, 0);
            canvas.style.display = 'block';

            if (mode === 'enroll') {
              handleEnroll();
            } else {
              handleVerify();
            }
          }
        } catch (e) {
          // silently ignore detection errors, retry next cycle
        }
      }

      async function captureNow() {
        setStatus('capturing', '采集中…');
        hintText.textContent = '正在提取人脸特征…';

        try {
          var detection = await faceapi
            .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 }))
            .withFaceLandmarks()
            .withFaceDescriptor();

          if (!detection) {
            showError('采集失败，请重新对准');
            setStatus('ready', '请将人脸对准框内');
            startDetectionLoop();
            return;
          }

          currentDescriptor = Array.from(detection.descriptor);

          ctx.drawImage(video, 0, 0);
          canvas.style.display = 'block';

          if (mode === 'enroll') {
            handleEnroll();
          } else {
            handleVerify();
          }
        } catch (e) {
          showError('检测异常: ' + e.message);
          setStatus('ready', '请将人脸对准框内');
          startDetectionLoop();
        }
      }

      // ===== 统一获取 box（兼容链式/非链式调用返回值结构） =====
      function getBox(detection) {
          if (!detection) return null;
          // WithFaceDetection 包装（链式调用返回）：detection.detection.box
          if (detection.detection && detection.detection.box) return detection.detection.box;
          // 原始 FaceDetection（非链式调用返回）：detection.box
          if (detection.box) return detection.box;
          return null;
      }

      // ===== 检查人脸是否在取景框内（基于 video 分辨率空间） =====
      function isFaceInOverlay(detection) {
        var box = getBox(detection);
        if (!box) return false;
        var faceCX = box.x + box.width / 2;
        var faceCY = box.y + box.height / 2;
        // 取景框对应 video 画面的中心 40% 区域
        var marginX = video.videoWidth * 0.30;
        var marginY = video.videoHeight * 0.30;
        console.log('[isFaceInOverlay]', JSON.stringify({
          box: { x: box.x, y: box.y, w: box.width, h: box.height },
          faceCenter: { x: faceCX, y: faceCY },
          videoSize: { w: video.videoWidth, h: video.videoHeight },
          margin: { x: marginX, y: marginY },
          zoneX: [marginX, video.videoWidth - marginX],
          zoneY: [marginY, video.videoHeight - marginY],
          result: faceCX >= marginX && faceCX <= video.videoWidth - marginX && faceCY >= marginY && faceCY <= video.videoHeight - marginY
        }));
        return faceCX >= marginX && faceCX <= (video.videoWidth - marginX) &&
               faceCY >= marginY && faceCY <= (video.videoHeight - marginY);
      }

      // ===== 根据人脸位置给出方向指引（基于 video 分辨率空间） =====
      function getPositionHint(detection) {
        var box = getBox(detection);
        if (!box) return '请将人脸移至取景框内';
        var faceCX = box.x + box.width / 2;
        var faceCY = box.y + box.height / 2;
        var centerX = video.videoWidth / 2;
        var centerY = video.videoHeight / 2;
        var dx = faceCX - centerX;
        var dy = faceCY - centerY;
        console.log('[getPositionHint]', JSON.stringify({
          faceCenter: { x: faceCX, y: faceCY },
          videoCenter: { x: centerX, y: centerY },
          delta: { dx: dx, dy: dy }
        }));
        if (Math.abs(dx) > Math.abs(dy)) {
          return dx < 0 ? '请向右移动' : '请向左移动';
        } else {
          return dy < 0 ? '请向下移动' : '请向上移动';
        }
      }

      // ===== 拍照 → 提取描述子 =====
      async function capture() {
        if (currentDescriptor) return;
        setStatus('capturing', '检测中…');

        try {
          var detection = await faceapi
            .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 }))
            .withFaceLandmarks()
            .withFaceDescriptor();

          if (!detection) {
            setStatus('error', '未检测到人脸，请重试');
            setTimeout(function() { setStatus('ready', '请将人脸对准框内'); }, 1500);
            return;
          }

          if (!isFaceInOverlay(detection)) {
            setStatus('error', '请将人脸移入框内');
            setTimeout(function() { setStatus('ready', '请将人脸对准框内'); }, 1500);
            return;
          }

          currentDescriptor = Array.from(detection.descriptor);

          // 暂停预览
          ctx.drawImage(video, 0, 0);
          canvas.style.display = 'block';

          // ===== 根据模式处理 =====
          if (mode === 'enroll') {
            handleEnroll();
          } else {
            handleVerify();
          }

        } catch (e) {
          showError('检测异常: ' + e.message);
          setStatus('ready', '请将人脸对准框内');
        }
      }

      // 采集模式：保存描述子到 localStorage
      function handleEnroll() {
        if (!Array.isArray(currentDescriptor) || currentDescriptor.length !== 128) {
          showError('描述子数据异常，请重新拍照');
          setStatus('error', '描述子数据异常');
          currentDescriptor = null;
          retry();
          return;
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(currentDescriptor));
        statusDot.className = 'dot dot-green';
        statusText.textContent = '录入完成';
        hintText.textContent = '';
        resultData = {
          mode: 'enroll',
          success: true,
          descriptor: currentDescriptor
        };
        showButtons('done');
      }

      // 验证模式：与存储的描述子比对
      function handleVerify() {
        // 描述子有效性检查
        if (!Array.isArray(storedDescriptor) || storedDescriptor.length !== 128) {
          showError('存储的描述子数据异常，请重新录入');
          setStatus('error', '描述子数据异常');
          clearStored();
          retry();
          return;
        }
        if (!Array.isArray(currentDescriptor) || currentDescriptor.length !== 128) {
          showError('描述子数据异常，请重新拍照');
          setStatus('error', '描述子数据异常');
          currentDescriptor = null;
          retry();
          return;
        }

        var distance = euclideanDistance(storedDescriptor, currentDescriptor);
        var matched = distance < THRESHOLD;
        var highConfidence = distance <= HIGH_CONFIDENCE;

        hintText.textContent = '';
        if (matched && highConfidence) {
          // 高置信度匹配成功
          statusDot.className = 'dot dot-green';
          statusText.textContent = '人脸匹配成功';
          overlay.classList.add('success');
        } else if (matched && !highConfidence) {
          // 匹配合格但置信度偏低
          statusDot.className = 'dot dot-green';
          statusText.textContent = '相似度较低，请重新拍照确认';
          overlay.classList.add('success');
        } else {
          // 不匹配
          statusDot.className = 'dot dot-red';
          statusText.textContent = '人脸不匹配';
          overlay.classList.add('fail');
        }

        resultData = {
          mode: 'verify',
          success: matched,
          highConfidence: highConfidence,
          distance: distance.toFixed(6),
          threshold: THRESHOLD,
          descriptor: currentDescriptor
        };
        if (matched && highConfidence) {
          showButtons('done');
        } else if (matched && !highConfidence) {
          showButtons('done-retry');
        } else {
          showButtons('retry');
        }
      }

      // 控制按钮显隐
      function showButtons(state) {
        captureBtn.style.display = 'none';

        if (state === 'done') {
          doneBtn.style.display = 'block';
          doneBtn.textContent = mode === 'enroll' ? '完成录入，返回小程序' : '验证通过，返回小程序';
        } else if (state === 'done-retry') {
          retryBtn.style.display = 'block';
          retryBtn.textContent = '重新采集';
          retryBtn.textContent = '重新采集';
        } else if (state === 'retry') {
          doneBtn.style.display = 'none';
          retryBtn.style.display = 'block';
          retryBtn.textContent = '重新拍照验证';
          hintText.textContent = '人脸不匹配，请重新对准取景框';
        }
      }

      // 清理 localStorage（重新录入时用）
      function clearStored() {
        localStorage.removeItem(STORAGE_KEY);
        storedDescriptor = null;
        mode = 'enroll';
        headerTitle.textContent = '第一步：人脸采集录入';
        hintText.textContent = '请将人脸移至取景框内，录入已重置';
      }

      // ===== 完成 → 回传小程序 =====
      function finish() {
        wx.miniProgram.postMessage({ data: resultData });
        wx.miniProgram.navigateBack();
      }

      // ===== 重新采集 =====
      function retry() {
        currentDescriptor = null;
        resultData = null;
        canvas.style.display = 'none';
        overlay.className = 'overlay';
        resultBanner.className = 'result-banner';
        resultBanner.textContent = '';
        doneBtn.style.display = 'none';
        retryBtn.style.display = 'none';
        setStatus('ready', '请将人脸对准框内');
        startDetectionLoop();
      }

      // ===== 欧氏距离 =====
      function euclideanDistance(a, b) {
        var sum = 0;
        for (var i = 0; i < a.length; i++) {
          var d = a[i] - b[i];
          sum += d * d;
        }
        return Math.sqrt(sum);
      }

      // 绑定事件
      doneBtn.addEventListener('click', finish);
      retryBtn.addEventListener('click', retry);

      // 长按"重新采集"可清除 localStorage（调试用）
      retryBtn.addEventListener('longpress', function() {
        clearStored();
        retry();
      });
      // 也监听 contextmenu（右键）作为 PC 调试入口
      retryBtn.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        clearStored();
        retry();
      });

      // ===== 启动 =====
      var valid = initMode();
      if (valid !== false) {
        captureBtn.style.display = 'none';
        loadModels();
      }
    })();
  </script>
</body>
</html>
